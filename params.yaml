data:
  root: data
  raw: data/raw
  saved: data/saved
  processed: data/processed
  splits: data/splits

split:
  seed: 42
  val_size: 0.15
  test_size: 0.15

train:
  seed: 42
  model: BaselineCNN
  loss_fn:
    name:
      CrossEntropyLoss
    params:
  optimizer:
    name: AdamW
    params:
      lr: 0.001
      weight_decay: 0.0001
  scheduler: 
    name: CosineAnnealingLR
    params:
      T_max: 100
      eta_min: 1e-6
  batch_size: 128
  epochs: 100
  path: models/final.pt
  best_path: models/best.pt

evaluate:
  metrics_file: reports/metrics.json

predict:
  submission_path: reports/submission.csv
