data:
  root: data
  raw: data/raw
  saved: data/saved
  processed: data/processed
  splits: data/splits

split:
  seed: 42
  val_size: 0.15
  test_size: 0.15

train:
  seed: 42
  model: BaselineCNN
  loss_fn:
    name:
      CrossEntropyLoss
    params:
  optimizer:
    name: Adam
    params:
      lr: 0.001
  batch_size: 128
  epochs: 100
  path: models/weights.pt

evaluate:
  metrics_file: reports/metrics.json

predict:
  submission_path: reports/submission.csv
